[build]
  publish = "."

# ─── REDIRECTS ───
# La carte est désormais hébergée sur menuonline.fr (externe).
# Toutes les anciennes URL carte/menu redirigent vers ce site externe.
[[redirects]]
  from = "/la-carte"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

[[redirects]]
  from = "/notre-carte"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

[[redirects]]
  from = "/carte-des-vins"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

[[redirects]]
  from = "/en/menu"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

[[redirects]]
  from = "/es/menu"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

[[redirects]]
  from = "/pt/menu"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

[[redirects]]
  from = "/zh/menu"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

[[redirects]]
  from = "/ja/menu"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

[[redirects]]
  from = "/ko/menu"
  to = "https://menuonline.fr/leflorentin/carte-restaurant"
  status = 301
  force = true

# ─── HEADERS ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/da/*.otf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"
    Content-Type = "font/otf"
